name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build runtime server bundle
      env:
        PAIPTREE_RUNTIME_SERVER: '1'
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        NEXT_PUBLIC_SUPABASE_PROJECT_ID: poc
        NEXT_PUBLIC_SUPABASE_EXPORT_VIEW: project_release_notes_export_v1
      run: |
        npm run build

    - name: Build Storybook
      run: npx --yes storybook build --output-dir out/storybook

    - name: Prepare runtime bundle
      run: |
        rm -rf deploy
        mkdir -p deploy/standalone deploy/static deploy/public deploy/storybook
        cp -R .next/standalone/. deploy/standalone/
        cp -R .next/static/. deploy/static/
        if [ -d public ]; then
          cp -R public/. deploy/public/
        fi
        cp -R out/storybook/. deploy/storybook/

    - name: Deploy runtime bundle to server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: 52.79.116.76
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "deploy/*"
        target: "/tmp/paiptree-deploy/"
        strip_components: 1

    - name: Install runtime service and configure nginx proxy
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: 52.79.116.76
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -e

          sudo systemctl disable --now paiptree-website 2>/dev/null || true
          sudo rm -f /etc/systemd/system/paiptree-website.service

          sudo install -d -m 755 /opt/paiptree-website/current
          sudo rm -rf /opt/paiptree-website/current/*
          sudo cp -R /tmp/paiptree-deploy/standalone/. /opt/paiptree-website/current/
          sudo mkdir -p /opt/paiptree-website/current/.next
          sudo rm -rf /opt/paiptree-website/current/.next/static
          sudo cp -R /tmp/paiptree-deploy/static /opt/paiptree-website/current/.next/static
          sudo rm -rf /opt/paiptree-website/current/public
          if [ -d /tmp/paiptree-deploy/public ]; then
            sudo cp -R /tmp/paiptree-deploy/public /opt/paiptree-website/current/public
          fi
          sudo rm -rf /opt/paiptree-website/current/storybook
          if [ -d /tmp/paiptree-deploy/storybook ]; then
            sudo cp -R /tmp/paiptree-deploy/storybook /opt/paiptree-website/current/storybook
          fi

          sudo tee /etc/paiptree-website.env >/dev/null <<'EOF'
          NODE_ENV=production
          PORT=3000
          HOSTNAME=0.0.0.0
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          CCTVUP_READ_SECRET=${{ secrets.CCTVUP_READ_SECRET }}
          CCTVUP_PUBLIC_READ=0
          CCTVUP_CRON_TRIGGER_SECRET=${{ secrets.CCTVUP_CRON_TRIGGER_SECRET }}
          CCTVUP_DB_HOST=${{ secrets.CCTVUP_DB_HOST }}
          CCTVUP_DB_PORT=${{ secrets.CCTVUP_DB_PORT }}
          CCTVUP_DB_USER=${{ secrets.CCTVUP_DB_USER }}
          CCTVUP_DB_PASSWORD=${{ secrets.CCTVUP_DB_PASSWORD }}
          CCTVUP_DB_DATABASE=${{ secrets.CCTVUP_DB_DATABASE }}
          NEXT_PUBLIC_SUPABASE_PROJECT_ID=poc
          NEXT_PUBLIC_SUPABASE_EXPORT_VIEW=project_release_notes_export_v1
          EOF

          NODE_BIN="$(command -v node || true)"
          if [ -z "$NODE_BIN" ]; then
            NODE_VERSION="20.19.2"
            case "$(uname -m)" in
              x86_64|amd64) NODE_ARCH="linux-x64" ;;
              aarch64|arm64) NODE_ARCH="linux-arm64" ;;
              *) echo "unsupported architecture for node install: $(uname -m)" >&2; exit 1 ;;
            esac
            NODE_INSTALL_DIR="/opt/node-$NODE_VERSION-$NODE_ARCH"
            if [ ! -x "$NODE_INSTALL_DIR/bin/node" ]; then
              sudo mkdir -p /opt
              curl -fsSL "https://nodejs.org/dist/v$NODE_VERSION/node-v$NODE_VERSION-$NODE_ARCH.tar.xz" -o /tmp/node.tar.xz
              sudo tar -xJf /tmp/node.tar.xz -C /opt
              sudo mv "/opt/node-v$NODE_VERSION-$NODE_ARCH" "$NODE_INSTALL_DIR"
            fi
            NODE_BIN="$NODE_INSTALL_DIR/bin/node"
          fi

          sudo tee /opt/paiptree-website/current/start-runtime.sh >/dev/null <<EOF
          #!/usr/bin/env bash
          set -u
          cd /opt/paiptree-website/current
          set -a
          source /etc/paiptree-website.env
          set +a
          : > /tmp/paiptree-website.log
          while true; do
            ${NODE_BIN} /opt/paiptree-website/current/server.js >> /tmp/paiptree-website.log 2>&1
            exit_code=\$?
            echo "\$(date -Is) paiptree runtime exited with code \${exit_code}; restarting in 2s" >> /tmp/paiptree-website.log
            sleep 2
          done
          EOF
          sudo chmod 755 /opt/paiptree-website/current/start-runtime.sh

          sudo tee /etc/systemd/system/paiptree-website.service >/dev/null <<EOF
          [Unit]
          Description=Paiptree Website (Next.js standalone)
          After=network.target

          [Service]
          Type=simple
          EnvironmentFile=/etc/paiptree-website.env
          WorkingDirectory=/opt/paiptree-website/current
          ExecStart=/bin/bash /opt/paiptree-website/current/start-runtime.sh
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable paiptree-website
          sudo systemctl start paiptree-website || true
          sudo systemctl status paiptree-website --no-pager -l || true
          sudo journalctl -u paiptree-website -n 80 --no-pager || true
          sudo tail -n 80 /tmp/paiptree-website.log || true

          sudo tee /etc/systemd/system/paiptree-website-watchdog.service >/dev/null <<'EOF'
          [Unit]
          Description=Paiptree Website watchdog

          [Service]
          Type=oneshot
          ExecStart=/bin/bash -lc 'if ! curl -fsS --max-time 3 http://127.0.0.1:3000/ >/dev/null; then systemctl restart paiptree-website; fi'
          EOF

          sudo tee /etc/systemd/system/paiptree-website-watchdog.timer >/dev/null <<'EOF'
          [Unit]
          Description=Run Paiptree Website watchdog periodically

          [Timer]
          OnBootSec=30s
          OnUnitActiveSec=30s
          AccuracySec=5s
          Unit=paiptree-website-watchdog.service

          [Install]
          WantedBy=timers.target
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable --now paiptree-website-watchdog.timer
          sudo systemctl start paiptree-website-watchdog.service || true

          if ! sudo systemctl is-active --quiet paiptree-website; then
            sudo systemctl disable --now paiptree-website 2>/dev/null || true
            sudo pkill -f '/opt/paiptree-website/current/start-runtime.sh' 2>/dev/null || true
            sudo pkill -f '/opt/paiptree-website/current/server.js' 2>/dev/null || true
            sudo nohup /bin/bash /opt/paiptree-website/current/start-runtime.sh >/tmp/paiptree-website.log 2>&1 < /dev/null & echo \$! >/tmp/paiptree-website.pid
            sleep 2
            sudo cat /tmp/paiptree-website.log || true
            if ! curl -fsS --max-time 5 http://127.0.0.1:3000/ >/dev/null; then
              sudo cat /tmp/paiptree-website.log || true
              exit 1
            fi
          fi

          sudo tee /etc/nginx/conf.d/default.conf >/dev/null <<EOF
          server {
              listen 80 default_server;
              server_name 52.79.116.76;
              root /opt/paiptree-website/current;

              location = /storybook {
                  return 301 /storybook/;
              }

              location /storybook/ {
                  try_files \$uri \$uri/ /storybook/index.html;
              }

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_set_header X-Forwarded-Host \$host;
              }
          }
          EOF

          sudo nginx -t

          sudo setsebool -P httpd_can_network_connect on 2>/dev/null || true
          sudo chcon -R -t httpd_sys_content_t /opt/paiptree-website/current/storybook 2>/dev/null || true
          sudo chcon -R -t httpd_sys_content_t /opt/paiptree-website/current/public 2>/dev/null || true

          sudo systemctl reload nginx
          for i in $(seq 1 24); do
            if curl -fsS --max-time 5 http://127.0.0.1:3000/ >/dev/null; then
              break
            fi
            sleep 2
          done
          sleep 30
          if ! sudo systemctl is-active --quiet paiptree-website; then
            sudo systemctl status paiptree-website --no-pager -l || true
            sudo journalctl -u paiptree-website -n 80 --no-pager || true
            exit 1
          fi
          if ! curl -fsS --max-time 5 http://127.0.0.1:3000/ >/dev/null; then
            sudo cat /tmp/paiptree-website.log || true
            sudo systemctl status paiptree-website --no-pager -l || true
            sudo journalctl -u paiptree-website -n 80 --no-pager || true
            exit 1
          fi
          sudo tail -n 80 /tmp/paiptree-website.log || true
          PUBLIC_ORIGIN="http://52.79.116.76"
          LOCAL_ORIGIN="http://127.0.0.1:3000"
          curl -I -sS --max-time 10 "${PUBLIC_ORIGIN}/" | head -n 1
          curl -I -sS --max-time 10 "${PUBLIC_ORIGIN}/cctvup/" | head -n 1
          curl -I -sS --max-time 10 "${PUBLIC_ORIGIN}/storybook/" | head -n 1
          curl -I -sS --max-time 10 "${PUBLIC_ORIGIN}/cherry_tms/grouping/?theme=light" | head -n 1

          CCTVUP_PAGE_STATUS="$(curl -sS --max-time 10 -o /tmp/cctvup-page.html -w '%{http_code}' "${PUBLIC_ORIGIN}/cctvup/" || true)"
          if [ "$CCTVUP_PAGE_STATUS" != "307" ] && [ "$CCTVUP_PAGE_STATUS" != "308" ]; then
            echo "Expected /cctvup/ without session to redirect to login, got ${CCTVUP_PAGE_STATUS}" >&2
            exit 1
          fi

          CCTVUP_READ_SECRET_VALUE='${{ secrets.CCTVUP_READ_SECRET }}'
          if [ -z "$CCTVUP_READ_SECRET_VALUE" ]; then
            CCTVUP_READ_SECRET_VALUE='${{ secrets.CCTVUP_CRON_TRIGGER_SECRET }}'
          fi
          if [ -z "$CCTVUP_READ_SECRET_VALUE" ]; then
            echo "CCTVUP read secret is missing" >&2
            exit 1
          fi

          CCTVUP_PUBLIC_STATUS="$(curl -sS --max-time 10 -o /tmp/cctvup-public.json -w '%{http_code}' "${PUBLIC_ORIGIN}/api/cctvup/" || true)"
          if [ "$CCTVUP_PUBLIC_STATUS" != "401" ]; then
            echo "Expected /api/cctvup/ without secret to return 401, got ${CCTVUP_PUBLIC_STATUS}" >&2
            exit 1
          fi

          CCTVUP_PROTECTED_STATUS="$(curl -sS --max-time 30 -o /tmp/cctvup-protected.json -w '%{http_code}' -H "x-cctvup-admin-secret: ${CCTVUP_READ_SECRET_VALUE}" "${LOCAL_ORIGIN}/api/cctvup/" || true)"
          if [ "$CCTVUP_PROTECTED_STATUS" = "503" ]; then
            echo "CCTVUP protected read returned 503. Auth gate is deployed, but server-side original DB reachability still needs follow-up." >&2
            "${NODE_BIN}" -e "const fs=require('fs'); try { const p=JSON.parse(fs.readFileSync('/tmp/cctvup-protected.json','utf8')); console.error({ source:p.source, message:p.message, mode:p.mode, status:p.status }); } catch {}"
            CCTVUP_CRON_SECRET_VALUE='${{ secrets.CCTVUP_CRON_TRIGGER_SECRET }}'
            if [ -n "$CCTVUP_CRON_SECRET_VALUE" ]; then
              curl -sS --max-time 15 -o /tmp/cctvup-health.json -H "x-cctvup-cron-secret: ${CCTVUP_CRON_SECRET_VALUE}" "${LOCAL_ORIGIN}/api/cctvup/health/" || true
              "${NODE_BIN}" -e "const fs=require('fs'); try { const p=JSON.parse(fs.readFileSync('/tmp/cctvup-health.json','utf8')); console.error('CCTVUP DB health', { ok:p.ok, env:p.env, connection:p.connection, query:p.query }); } catch {}"
            fi
          elif [ "$CCTVUP_PROTECTED_STATUS" != "200" ]; then
            echo "Expected /api/cctvup/ with secret to return 200 or known DB-unavailable 503, got ${CCTVUP_PROTECTED_STATUS}" >&2
            "${NODE_BIN}" -e "const fs=require('fs'); try { const p=JSON.parse(fs.readFileSync('/tmp/cctvup-protected.json','utf8')); console.error({ source:p.source, message:p.message, mode:p.mode, status:p.status }); } catch {}"
            exit 1
          else
            "${NODE_BIN}" -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('/tmp/cctvup-protected.json','utf8')); if (p.source !== 'db') { console.error('Expected CCTVUP source=db, got', { source:p.source, message:p.message }); process.exit(1); } console.log('CCTVUP protected read ok', { farms:p.summary?.farms, cameras:p.summary?.cameras, source:p.source });"
          fi

          CCTVUP_SMOKE_STATUS="$(curl -sS --max-time 40 -o /tmp/cctvup-smoke.json -w '%{http_code}' -H "x-cctvup-admin-secret: ${CCTVUP_READ_SECRET_VALUE}" "${LOCAL_ORIGIN}/api/cctvup/smoke/" || true)"
          "${NODE_BIN}" -e "const fs=require('fs'); try { const p=JSON.parse(fs.readFileSync('/tmp/cctvup-smoke.json','utf8')); console.log('CCTVUP smoke summary', { httpStatus:'${CCTVUP_SMOKE_STATUS}', ok:p.ok, failureCount:p.failureCount, warningCount:p.warningCount, message:p.message }); } catch (error) { console.log('CCTVUP smoke response was not JSON', { httpStatus:'${CCTVUP_SMOKE_STATUS}' }); }"

          echo '=== nginx sockets ==='
          sudo ss -ltnp | grep -E ':(80|3000)\b' || true
          echo '=== nginx error log ==='
          sudo tail -n 80 /var/log/nginx/error.log || true
          echo '=== nginx merged config (relevant lines) ==='
          sudo nginx -T 2>&1 | grep -nE 'listen 80|server_name|proxy_pass|root ' || true
          echo '=== process netns ==='
          NGINX_PID="$(pgrep -xo nginx || true)"
          NODE_PID="$(pgrep -fo '/opt/paiptree-website/current/server.js' || true)"
          if [ -n "$NGINX_PID" ]; then
            echo "nginx=$NGINX_PID $(readlink /proc/$NGINX_PID/ns/net || true)"
          fi
          if [ -n "$NODE_PID" ]; then
            echo "node=$NODE_PID $(readlink /proc/$NODE_PID/ns/net || true)"
          fi

          rm -rf /tmp/paiptree-deploy/
