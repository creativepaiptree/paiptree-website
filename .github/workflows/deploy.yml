name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build and Export
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        NEXT_PUBLIC_SUPABASE_PROJECT_ID: poc
        NEXT_PUBLIC_SUPABASE_EXPORT_VIEW: project_release_notes_export_v1
      run: |
        npm run build
        mkdir -p out
        touch out/.nojekyll

    - name: Build Storybook
      run: npx --yes storybook build --output-dir out/storybook

    - name: Deploy to server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: 52.79.116.76
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "out/*"
        target: "/tmp/paiptree-deploy/"
        strip_components: 1

    - name: Move files to nginx directory
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: 52.79.116.76
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -e

          sudo systemctl disable --now paiptree-website 2>/dev/null || true
          sudo rm -f /etc/systemd/system/paiptree-website.service
          sudo systemctl daemon-reload

          sudo tee /etc/nginx/conf.d/default.conf >/dev/null <<'EOF'
          server {
              listen 80 default_server;
              server_name _;

              root /usr/share/nginx/html;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }
          }
          EOF

          sudo nginx -t

          sudo rm -rf /usr/share/nginx/html/*
          sudo cp -r /tmp/paiptree-deploy/* /usr/share/nginx/html/
          sudo chown -R nginx:nginx /usr/share/nginx/html/
          sudo chmod -R 755 /usr/share/nginx/html/
          sudo systemctl reload nginx
          curl -I -sS --max-time 10 http://127.0.0.1/ | head -n 1
          curl -I -sS --max-time 10 http://127.0.0.1/cherry_tms/grouping/?theme=light | head -n 1
          rm -rf /tmp/paiptree-deploy/
