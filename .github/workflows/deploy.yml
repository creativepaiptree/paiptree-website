name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build runtime server bundle
      env:
        PAIPTREE_RUNTIME_SERVER: '1'
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        NEXT_PUBLIC_SUPABASE_PROJECT_ID: poc
        NEXT_PUBLIC_SUPABASE_EXPORT_VIEW: project_release_notes_export_v1
      run: |
        npm run build

    - name: Build Storybook
      run: npx --yes storybook build --output-dir out/storybook

    - name: Prepare runtime bundle
      run: |
        rm -rf deploy
        mkdir -p deploy/standalone deploy/static deploy/public deploy/storybook
        cp -R .next/standalone/. deploy/standalone/
        cp -R .next/static/. deploy/static/
        if [ -d public ]; then
          cp -R public/. deploy/public/
        fi
        cp -R out/storybook/. deploy/storybook/

    - name: Deploy runtime bundle to server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: 52.79.116.76
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "deploy/*"
        target: "/tmp/paiptree-deploy/"
        strip_components: 1

    - name: Install runtime service and configure nginx proxy
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: 52.79.116.76
        username: ec2-user
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -e

          sudo systemctl disable --now paiptree-website 2>/dev/null || true
          sudo rm -f /etc/systemd/system/paiptree-website.service

          sudo install -d -m 755 /opt/paiptree-website/current
          sudo rm -rf /opt/paiptree-website/current/*
          sudo cp -R /tmp/paiptree-deploy/standalone/. /opt/paiptree-website/current/
          sudo mkdir -p /opt/paiptree-website/current/.next
          sudo rm -rf /opt/paiptree-website/current/.next/static
          sudo cp -R /tmp/paiptree-deploy/static /opt/paiptree-website/current/.next/static
          sudo rm -rf /opt/paiptree-website/current/public
          if [ -d /tmp/paiptree-deploy/public ]; then
            sudo cp -R /tmp/paiptree-deploy/public /opt/paiptree-website/current/public
          fi
          sudo rm -rf /opt/paiptree-website/current/storybook
          if [ -d /tmp/paiptree-deploy/storybook ]; then
            sudo cp -R /tmp/paiptree-deploy/storybook /opt/paiptree-website/current/storybook
          fi

          sudo tee /etc/paiptree-website.env >/dev/null <<'EOF'
          NODE_ENV=production
          PORT=3000
          HOSTNAME=127.0.0.1
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          NEXT_PUBLIC_SUPABASE_PROJECT_ID=poc
          NEXT_PUBLIC_SUPABASE_EXPORT_VIEW=project_release_notes_export_v1
          EOF

          NODE_BIN="$(command -v node)"
          if [ -z "$NODE_BIN" ]; then
            echo "node binary not found on target host" >&2
            exit 1
          fi

          sudo tee /etc/systemd/system/paiptree-website.service >/dev/null <<EOF
          [Unit]
          Description=Paiptree Website (Next.js standalone)
          After=network.target

          [Service]
          Type=simple
          EnvironmentFile=/etc/paiptree-website.env
          WorkingDirectory=/opt/paiptree-website/current
          ExecStart=${NODE_BIN} /opt/paiptree-website/current/server.js
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable paiptree-website
          sudo systemctl start paiptree-website || true
          sudo systemctl status paiptree-website --no-pager -l || true
          sudo journalctl -u paiptree-website -n 80 --no-pager || true
          if ! sudo systemctl is-active --quiet paiptree-website; then
            sudo systemctl disable --now paiptree-website 2>/dev/null || true
            sudo pkill -f '/opt/paiptree-website/current/server.js' 2>/dev/null || true
            sudo bash -lc "set -euxo pipefail; cd /opt/paiptree-website/current && set -a && source /etc/paiptree-website.env && nohup ${NODE_BIN} /opt/paiptree-website/current/server.js >/tmp/paiptree-website.log 2>&1 < /dev/null & echo \$! >/tmp/paiptree-website.pid"
            sleep 2
            sudo cat /tmp/paiptree-website.log || true
            if ! curl -fsS --max-time 5 http://127.0.0.1:3000/ >/dev/null; then
              sudo cat /tmp/paiptree-website.log || true
              exit 1
            fi
          fi

          sudo tee /etc/nginx/conf.d/default.conf >/dev/null <<'EOF'
          server {
              listen 80 default_server;
              server_name 52.79.116.76;
              root /opt/paiptree-website/current;

              location = /storybook {
                  return 301 /storybook/;
              }

              location /storybook/ {
                  try_files $uri $uri/ /storybook/index.html;
              }

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header X-Forwarded-Host $host;
              }
          }
          EOF

          sudo nginx -t

          sudo systemctl reload nginx
          for i in $(seq 1 24); do
            if curl -fsS --max-time 5 http://127.0.0.1:3000/ >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -I -sS --max-time 10 http://127.0.0.1/ | head -n 1
          curl -I -sS --max-time 10 http://127.0.0.1/cctvup/ | head -n 1
          curl -I -sS --max-time 10 http://127.0.0.1/storybook/ | head -n 1
          curl -I -sS --max-time 10 http://127.0.0.1/cherry_tms/grouping/?theme=light | head -n 1
          sudo systemctl status paiptree-website --no-pager -l || true
          sudo journalctl -u paiptree-website -n 50 --no-pager || true
          rm -rf /tmp/paiptree-deploy/
