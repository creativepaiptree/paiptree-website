name: CCTVUP Check

on:
  # CCTVUP의 1차 운영 체크는 원본 DB에 접근 가능한 로컬 24시간 PC에서 실행한다.
  # GitHub-hosted runner나 현재 웹 배포 서버가 원본 CCTV DB를 읽지 못하면 5분마다 실패 메일이 쌓인다.
  # 웹 서버에서 원본 DB 접근이 검증된 뒤에만 schedule을 다시 켠다.
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Run CCTVUP checker
        env:
          CCTVUP_CHECK_URL: ${{ secrets.CCTVUP_CHECK_URL }}
          CCTVUP_CRON_TRIGGER_SECRET: ${{ secrets.CCTVUP_CRON_TRIGGER_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CCTVUP_CHECK_URL:-}" ]; then
            echo "CCTVUP_CHECK_URL secret is missing" >&2
            exit 1
          fi
          if [ -z "${CCTVUP_CRON_TRIGGER_SECRET:-}" ]; then
            echo "CCTVUP_CRON_TRIGGER_SECRET secret is missing" >&2
            exit 1
          fi

          response_file="$(mktemp)"
          http_status="$(curl --silent --show-error --max-time 120 \
            --output "${response_file}" \
            --write-out '%{http_code}' \
            -H "x-cctvup-cron-secret: ${CCTVUP_CRON_TRIGGER_SECRET}" \
            "${CCTVUP_CHECK_URL}")"

          cat "${response_file}"
          echo

          if [ "${http_status}" -lt 200 ] || [ "${http_status}" -ge 300 ]; then
            echo "CCTVUP checker failed with HTTP ${http_status}" >&2
            exit 1
          fi
